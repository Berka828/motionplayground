<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BxCM Creative World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
</head>

<body>
  <div id="splash">
    <div class="splash-card">
      <img src="bxcm-logo.png" class="logo" alt="BxCM Logo" />

      <div class="eyebrow">BxCM Creative World</div>
      <h1>Color Motion Playground</h1>
      <p>Move your hands to paint. Jump to make the wall bloom.</p>

      <select id="cameraSelect"></select>

      <select id="modeSelect">
        <option value="paint">Paint Trails</option>
        <option value="bubbles">Bubbles</option>
        <option value="stars">Stars</option>
        <option value="flowers">Flowers</option>
        <option value="mist">Graffiti Mist</option>
        <option value="waves">Color Waves</option>
      </select>

      <button id="startBtn">Start Experience</button>

      <div class="hint">
        Keys: 1–6 modes · C clear · F fullscreen · H hide controls · S sound · L logo
      </div>
    </div>
  </div>

  <div id="game">
    <video id="video" autoplay playsinline muted></video>

    <img id="watermarkLogo" src="bxcm-logo.png" alt="BxCM Logo" />

    <canvas id="paintCanvas"></canvas>
    <canvas id="fxCanvas"></canvas>

    <div id="topTitle" class="introText">
      <span>CREATE</span> Color Motion Playground
    </div>

    <div id="instruction" class="introText">
      Move your hands slowly. Jump to make the wall bloom.
    </div>

    <div id="modeBadge">Paint Trails</div>

    <div id="staffPanel">
      <button data-mode="paint">Paint</button>
      <button data-mode="bubbles">Bubbles</button>
      <button data-mode="stars">Stars</button>
      <button data-mode="flowers">Flowers</button>
      <button data-mode="mist">Mist</button>
      <button data-mode="waves">Waves</button>

      <button id="clearBtn">Clear</button>
      <button id="autoBtn">Auto: Off</button>
      <button id="soundBtn">Sound: Off</button>
      <button id="logoBtn">Logo: On</button>
      <button id="hideBtn">Hide</button>

      <label>Fade <input id="fadeSlider" type="range" min="10" max="90" value="42" /></label>
      <label>Float <input id="dragSlider" type="range" min="920" max="995" value="970" /></label>
      <label>Jump <input id="jumpSlider" type="range" min="18" max="70" value="34" /></label>
      <label>Smooth <input id="smoothSlider" type="range" min="8" max="45" value="22" /></label>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
